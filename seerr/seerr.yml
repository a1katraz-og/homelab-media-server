services:
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    environment:
      - TZ=${TZ}
      - PORT=5055 #optional
    volumes:
      - ./config:/app/config
    ports:
      - "5055:5055"
    restart: unless-stopped
    networks:
      - homelab_network
    depends_on:
      - jellyfin
