# docker-compose.yml
services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    command:
      - "--api.insecure=true" #Do not enable this flag in production
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock